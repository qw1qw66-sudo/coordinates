<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>عارض الإحداثيات</title>
  <meta name="description" content="عارض إحداثيات مواقع العمل للعملاء والموردين" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="app-header">
    <h1>عارض الإحداثيات</h1>
    <p class="subtitle">عرض إحداثيات مواقع العمل وفتحها مباشرة في خرائط Google</p>
  </header>

  <main class="container">
    <!-- Toolbar -->
    <section class="toolbar">
      <div class="file-controls">
        <label for="fileInput" class="btn btn-primary">
          تحميل ملف Excel أو CSV
        </label>
        <input type="file" id="fileInput" accept=".xlsx,.xls,.csv" hidden />

        <button id="loadSampleBtn" class="btn btn-secondary" type="button">
          تجربة بيانات عينة
        </button>

        <button id="exportBtn" class="btn btn-secondary" type="button" disabled>
          تصدير CSV
        </button>
      </div>

      <div class="search-box">
        <input
          type="search"
          id="searchInput"
          placeholder="ابحث بالرقم أو الإحداثيات"
          autocomplete="off"
        />
      </div>
    </section>

    <!-- Counters -->
    <section class="counters" id="counters">
      <div class="counter">
        <span class="counter-value" id="totalCount">0</span>
        <span class="counter-label">إجمالي السجلات</span>
      </div>
      <div class="counter counter-valid">
        <span class="counter-value" id="validCount">0</span>
        <span class="counter-label">إحداثيات صالحة</span>
      </div>
      <div class="counter counter-missing">
        <span class="counter-value" id="missingCount">0</span>
        <span class="counter-label">إحداثيات مفقودة</span>
      </div>
    </section>

    <!-- Status message -->
    <p id="statusMsg" class="status-msg"></p>

    <!-- Table -->
    <section class="table-wrapper">
      <table id="dataTable">
        <thead>
          <tr>
            <th>الرقم</th>
            <th>الإحداثيات</th>
            <th>رابط الخرائط</th>
            <th>الحالة</th>
          </tr>
        </thead>
        <tbody id="tableBody">
          <tr>
            <td colspan="4" class="empty-state">
              قم بتحميل ملف Excel أو CSV لعرض السجلات، أو جرّب بيانات العينة.
            </td>
          </tr>
        </tbody>
      </table>
    </section>
  </main>

  <footer class="app-footer">
    <p>يعمل بالكامل داخل المتصفح — لا حاجة لخادم أو قاعدة بيانات.</p>
  </footer>

  <!-- toast for copy feedback -->
  <div id="toast" class="toast" role="status" aria-live="polite"></div>

  <!-- xlsx parser (loaded from CDN) -->
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
